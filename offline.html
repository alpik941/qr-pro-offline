<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - QR Pro</title>
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background: #0f1b4c;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        text-align: center;
      }
      .container {
        max-width: 400px;
      }
      .icon {
        width: 80px;
        height: 80px;
        background: #22c55e;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
      }
      .icon svg {
        width: 40px;
        height: 40px;
        fill: white;
      }
      h1 {
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 16px;
      }
      p {
        color: #94a3b8;
        margin-bottom: 24px;
        line-height: 1.5;
      }
      .retry-btn {
        background: #22c55e;
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.3s;
      }
      .retry-btn:hover {
        background: #16a34a;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"
          />
        </svg>
      </div>
      <h1>You're Offline</h1>
      <p>QR Pro works offline! Check your internet connection and try again.</p>
      <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
    </div>
  </body>
</html>
